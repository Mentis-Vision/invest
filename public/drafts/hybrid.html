<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClearPath · Hybrid v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* ═══ Tokens — light blue utilitarian ═══════════════ */
      :root {
        --bg: #f4f7fb;
        --bg-soft: #edf1f7;
        --surface: #ffffff;
        --ink: #0f172a;
        --ink-soft: #334155;
        --muted: #64748b;
        --subtle: #94a3b8;
        --rule: #e4e9f1;
        --rule-soft: #eef2f7;
        --accent: #2563eb;
        --accent-soft: #dbeafe;
        --buy: #059669;
        --buy-soft: #d1fae5;
        --sell: #dc2626;
        --sell-soft: #fee2e2;
        --hold: #ca8a04;
        --hold-soft: #fef3c7;
      }

      * {
        box-sizing: border-box;
        margin: 0;
      }
      html {
        font-size: 14px;
      }
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: "Inter", -apple-system, system-ui, sans-serif;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        padding-bottom: 6rem;
        letter-spacing: -0.005em;
      }
      a {
        color: inherit;
      }
      .mono {
        font-family: "JetBrains Mono", monospace;
        font-variant-numeric: tabular-nums;
        letter-spacing: 0;
      }

      /* ═══ Ticker tape ═══════════════════════════════════ */
      .ticker-wrap {
        background: var(--ink);
        color: #e2e8f0;
        overflow: hidden;
      }
      .ticker-track {
        display: flex;
        gap: 40px;
        padding: 9px 0;
        white-space: nowrap;
        animation: tickerScroll 90s linear infinite;
        font-size: 12px;
        font-weight: 500;
        will-change: transform;
      }
      .ticker-wrap:hover .ticker-track {
        animation-play-state: paused;
      }
      @keyframes tickerScroll {
        from { transform: translateX(0); }
        to { transform: translateX(-50%); }
      }
      .tkr-item {
        display: inline-flex;
        align-items: baseline;
        gap: 8px;
        flex-shrink: 0;
      }
      .tkr-item .s {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        color: #f1f5f9;
      }
      .tkr-item .p {
        font-family: "JetBrains Mono", monospace;
        color: #cbd5e1;
      }
      .tkr-item .d {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
      }
      .tkr-item .d.up { color: #34d399; }
      .tkr-item .d.dn { color: #f87171; }
      .tkr-sep { color: #475569; }

      /* ═══ Top nav ═══════════════════════════════════════ */
      header.top {
        background: var(--surface);
        border-bottom: 1px solid var(--rule);
        padding: 14px 28px;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 20px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 15px;
        letter-spacing: -0.015em;
      }
      .brand-mark {
        width: 24px;
        height: 24px;
        border-radius: 6px;
        background: var(--accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .brand-mark::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 2px;
        background: white;
        transform: rotate(45deg);
      }
      nav.tabs {
        display: flex;
        gap: 2px;
        justify-self: center;
      }
      nav.tabs a {
        padding: 8px 16px;
        font-size: 13px;
        font-weight: 500;
        text-decoration: none;
        color: var(--muted);
        border-radius: 6px;
        transition: all 0.15s;
      }
      nav.tabs a:hover {
        color: var(--ink);
        background: var(--bg-soft);
      }
      nav.tabs a.active {
        color: var(--ink);
        background: var(--bg-soft);
      }
      .top-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        border-radius: 8px;
        border: 1px solid var(--rule);
        background: var(--surface);
        color: var(--muted);
        cursor: pointer;
        transition: all 0.15s;
      }
      .icon-btn:hover {
        border-color: var(--subtle);
        color: var(--ink);
      }
      .icon-btn.active {
        background: var(--accent);
        color: white;
        border-color: var(--accent);
      }
      .avatar-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 4px 12px 4px 4px;
        border: 1px solid var(--rule);
        border-radius: 999px;
        background: var(--surface);
        cursor: pointer;
      }
      .avatar-chip:hover {
        border-color: var(--subtle);
      }
      .avatar-chip .av {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        background: var(--ink);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 600;
      }
      .avatar-chip .nm {
        font-size: 12px;
        color: var(--ink-soft);
      }

      /* ═══ Greeting ══════════════════════════════════════ */
      .greeting {
        max-width: 1320px;
        margin: 0 auto;
        padding: 28px 28px 4px;
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 20px;
        flex-wrap: wrap;
      }
      .greeting h1 {
        font-size: 22px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      .greeting h1 .delta { color: var(--buy); font-weight: 500; }
      .greeting h1 .delta.dn { color: var(--sell); }
      .greeting .sub {
        font-size: 13px;
        color: var(--muted);
      }

      /* ═══ Dashboard frame ══════════════════════════════ */
      main.dash {
        max-width: 1320px;
        margin: 0 auto;
        padding: 20px 28px 0;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 16px;
      }
      .col-3 { grid-column: span 3; }
      .col-4 { grid-column: span 4; }
      .col-6 { grid-column: span 6; }
      .col-8 { grid-column: span 8; }
      .col-12 { grid-column: span 12; }

      @media (max-width: 1100px) {
        .col-3, .col-4 { grid-column: span 6; }
      }
      @media (max-width: 720px) {
        .col-3, .col-4, .col-6, .col-8 { grid-column: span 12; }
      }

      /* ═══ Block primitive ═══════════════════════════════ */
      .block {
        background: var(--surface);
        border: 1px solid var(--rule);
        border-radius: 10px;
        padding: 16px 18px;
        position: relative;
        min-height: 0;
      }
      .block-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 12px;
        padding-bottom: 10px;
        border-bottom: 1px solid var(--rule-soft);
        gap: 10px;
      }
      .block-head h2 {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: -0.005em;
      }
      .block-head .hint {
        font-size: 11px;
        color: var(--muted);
      }

      /* Edit-mode overlay */
      .block-edit {
        position: absolute;
        top: 8px;
        right: 8px;
        display: none;
        gap: 4px;
        align-items: center;
        background: var(--surface);
        padding: 3px;
        border: 1px solid var(--rule);
        border-radius: 8px;
        box-shadow: 0 2px 10px rgba(15, 23, 42, 0.06);
        z-index: 2;
      }
      body.editing .block-edit {
        display: inline-flex;
      }
      body.editing .block {
        outline: 1.5px dashed var(--accent);
        outline-offset: -2px;
        cursor: move;
      }
      body.editing .block:hover {
        outline-color: var(--ink);
      }
      .block-edit .grip {
        width: 22px;
        height: 22px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--subtle);
        cursor: grab;
      }
      .block-edit .sz-group { display: inline-flex; gap: 1px; }
      .block-edit .sz {
        padding: 3px 7px;
        font-size: 10px;
        font-weight: 600;
        color: var(--muted);
        background: transparent;
        border: 0;
        border-radius: 4px;
        cursor: pointer;
        font-family: inherit;
        letter-spacing: 0.03em;
      }
      .block-edit .sz:hover {
        background: var(--bg-soft);
        color: var(--ink);
      }
      .block-edit .sz.on {
        background: var(--accent);
        color: white;
      }
      .block-edit .x {
        width: 22px;
        height: 22px;
        border: 0;
        background: transparent;
        border-radius: 4px;
        color: var(--muted);
        cursor: pointer;
      }
      .block-edit .x:hover {
        background: var(--sell-soft);
        color: var(--sell);
      }

      /* ═══ "Customize" / add-panel ══════════════════════ */
      .add-panel {
        display: none;
        margin-top: 16px;
        padding: 16px 18px;
        background: var(--surface);
        border: 1.5px dashed var(--accent);
        border-radius: 10px;
      }
      body.editing .add-panel { display: block; }
      .add-panel h3 {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--accent);
        margin-bottom: 10px;
      }
      .add-panel .list {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }
      .add-panel button {
        padding: 6px 12px;
        background: var(--bg-soft);
        border: 1px solid var(--rule);
        border-radius: 6px;
        font-size: 12px;
        color: var(--ink-soft);
        cursor: pointer;
        font-family: inherit;
      }
      .add-panel button:hover {
        border-color: var(--accent);
        color: var(--accent);
      }

      /* ═══ Block content styles ═══════════════════════════ */
      .stat-row {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 14px;
      }
      .stat .k {
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .stat .v {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 20px;
        letter-spacing: -0.02em;
        margin-top: 2px;
      }
      .stat .d {
        font-size: 11px;
        margin-top: 2px;
        color: var(--muted);
      }
      .stat .d.up { color: var(--buy); }
      .stat .d.dn { color: var(--sell); }

      table.t { width: 100%; border-collapse: collapse; font-size: 12px; }
      .t th {
        text-align: left;
        font-weight: 500;
        font-size: 10px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 6px 8px 6px 0;
        border-bottom: 1px solid var(--rule);
      }
      .t th.num, .t td.num {
        text-align: right;
        font-family: "JetBrains Mono", monospace;
      }
      .t td {
        padding: 8px 8px 8px 0;
        border-bottom: 1px solid var(--rule-soft);
      }
      .t tr:last-child td { border-bottom: 0; }
      .t td.sym { font-family: "JetBrains Mono", monospace; font-weight: 600; }
      .t td.name { color: var(--muted); }
      .pos { color: var(--buy); }
      .neg { color: var(--sell); }
      .bar {
        height: 4px;
        background: var(--bg-soft);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
        width: 56px;
      }
      .bar .fill {
        position: absolute;
        inset: 0;
        width: var(--w, 50%);
        background: var(--accent);
      }

      .list-item { padding: 10px 0; border-bottom: 1px solid var(--rule-soft); }
      .list-item:last-child { border-bottom: 0; }
      .list-item .src {
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }
      .list-item .hed {
        font-size: 13px;
        margin-top: 3px;
        line-height: 1.4;
      }
      .list-item .hed a { text-decoration: none; }
      .list-item .hed a:hover { color: var(--accent); }

      .pill {
        display: inline-block;
        padding: 2px 7px;
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 500;
        border-radius: 3px;
      }
      .pill.buy { color: var(--buy); background: var(--buy-soft); }
      .pill.hold { color: var(--hold); background: var(--hold-soft); }
      .pill.sell { color: var(--sell); background: var(--sell-soft); }

      .chart-svg { width: 100%; height: 140px; display: block; }
      .chart-meta {
        display: flex;
        justify-content: space-between;
        font-size: 11px;
        color: var(--muted);
        margin-top: 4px;
      }

      .row-item {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        padding: 9px 0;
        border-bottom: 1px solid var(--rule-soft);
        font-size: 12px;
      }
      .row-item:last-child { border-bottom: 0; }
      .row-item .l { color: var(--ink-soft); }
      .row-item .r {
        font-size: 10px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .cal-item {
        display: grid;
        grid-template-columns: 44px 1fr auto;
        gap: 10px;
        padding: 9px 0;
        border-bottom: 1px solid var(--rule-soft);
        align-items: baseline;
      }
      .cal-item:last-child { border-bottom: 0; }
      .cal-item .date {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 16px;
        letter-spacing: -0.02em;
      }
      .cal-item .date .day {
        display: block;
        font-size: 9px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--muted);
        font-weight: 500;
      }
      .cal-item .ev { font-size: 12px; }
      .cal-item .ev strong { font-family: "JetBrains Mono", monospace; font-weight: 600; }
      .cal-item .ev .t { color: var(--muted); font-size: 11px; display: block; }
      .cal-item .w { font-size: 10px; color: var(--muted); text-align: right; }

      .sector-bar {
        display: grid;
        grid-template-columns: 100px 1fr 40px;
        gap: 10px;
        align-items: center;
        padding: 6px 0;
        font-size: 12px;
      }
      .sector-bar .lbl { color: var(--ink-soft); }
      .sector-bar .p {
        text-align: right;
        font-family: "JetBrains Mono", monospace;
        color: var(--muted);
      }

      .macro-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .macro-item {
        padding: 8px 10px;
        background: var(--bg-soft);
        border-radius: 6px;
      }
      .macro-item .k {
        font-size: 10px;
        color: var(--muted);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .macro-item .v {
        font-family: "JetBrains Mono", monospace;
        font-weight: 600;
        font-size: 15px;
        margin-top: 3px;
      }
      .macro-item .d { font-size: 10px; color: var(--muted); }

      .mover {
        display: flex;
        justify-content: space-between;
        padding: 7px 0;
        border-bottom: 1px solid var(--rule-soft);
        align-items: baseline;
      }
      .mover:last-child { border-bottom: 0; }
      .mover .t { font-family: "JetBrains Mono", monospace; font-weight: 600; }
      .mover .v { font-family: "JetBrains Mono", monospace; font-size: 12px; }

      footer {
        max-width: 1320px;
        margin: 72px auto 0;
        padding: 20px 28px;
        text-align: center;
        font-size: 11px;
        color: var(--muted);
      }
      footer a { color: var(--accent); text-decoration: none; }

      @keyframes slideIn {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: none; }
      }
      .block.added { animation: slideIn 0.2s ease-out; }
    </style>
  </head>
  <body>
    <!-- Ticker tape -->
    <div class="ticker-wrap">
      <div class="ticker-track" id="tickerTrack"></div>
    </div>

    <!-- Top nav -->
    <header class="top">
      <div class="brand">
        <span class="brand-mark"></span>
        ClearPath
      </div>
      <nav class="tabs">
        <a href="#" class="active">Dashboard</a>
        <a href="#">Portfolio</a>
        <a href="#">Research</a>
        <a href="#">Strategy</a>
        <a href="#">History</a>
      </nav>
      <div class="top-right">
        <button
          class="icon-btn"
          id="editToggle"
          title="Customize dashboard"
          aria-label="Customize"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 16 16"
            fill="none"
            stroke="currentColor"
            stroke-width="1.6"
          >
            <circle cx="8" cy="8" r="1.4" />
            <path
              d="M8 2v2M8 12v2M3.5 3.5l1.4 1.4M11.1 11.1l1.4 1.4M2 8h2M12 8h2M3.5 12.5l1.4-1.4M11.1 4.9l1.4-1.4"
            />
          </svg>
        </button>
        <button class="avatar-chip">
          <span class="av">SL</span>
          <span class="nm">Sang</span>
        </button>
      </div>
    </header>

    <!-- Greeting -->
    <div class="greeting">
      <h1>Good morning, Sang. Portfolio is <span class="delta">+2.31% today</span>.</h1>
      <span class="sub">Updated <span class="mono">6:42 AM</span> · Friday, Apr 17</span>
    </div>

    <main class="dash">
      <div class="grid" id="grid"></div>

      <!-- Add-a-section panel (shown in edit mode) -->
      <div class="add-panel">
        <h3>+ Add a section</h3>
        <div class="list" id="addList"></div>
      </div>
    </main>

    <footer>
      <a href="/drafts/index.html">← Compare drafts</a>
      &nbsp;·&nbsp; Informational only · Not investment advice
    </footer>

    <script>
      // ═══════════════════════════════════════════════════
      // Helpers — all DOM built via createElement (no innerHTML)
      // ═══════════════════════════════════════════════════
      function el(tag, attrs, children) {
        const n = document.createElement(tag);
        if (attrs) {
          for (const k in attrs) {
            if (k === "className") n.className = attrs[k];
            else if (k === "style") n.style.cssText = attrs[k];
            else if (k.startsWith("on") && typeof attrs[k] === "function")
              n.addEventListener(k.slice(2).toLowerCase(), attrs[k]);
            else n.setAttribute(k, attrs[k]);
          }
        }
        if (children != null) {
          const arr = Array.isArray(children) ? children : [children];
          for (const c of arr) {
            if (c == null) continue;
            if (typeof c === "string") n.appendChild(document.createTextNode(c));
            else n.appendChild(c);
          }
        }
        return n;
      }
      function t(tag, className, text) {
        return el(tag, className ? { className } : null, text == null ? null : String(text));
      }

      // ═══ Ticker tape ═══
      const tickerItems = [
        { s: "S&P 500", p: "7,142.18", d: "+0.62%", up: true },
        { s: "NASDAQ", p: "22,487.03", d: "+1.12%", up: true },
        { s: "DOW", p: "44,891.22", d: "+0.34%", up: true },
        { s: "RUT", p: "2,314.71", d: "-0.18%", up: false },
        { s: "10Y", p: "4.32%", d: "+4 bps", up: true },
        { s: "VIX", p: "14.8", d: "-2.1%", up: false },
        { s: "NVDA", p: "$1,294.18", d: "+3.29%", up: true },
        { s: "AAPL", p: "$248.11", d: "+0.84%", up: true },
        { s: "MSFT", p: "$514.23", d: "+1.12%", up: true },
        { s: "BTC", p: "$75,077", d: "+4.10%", up: true },
        { s: "VOO", p: "$498.74", d: "+0.62%", up: true },
        { s: "F", p: "$11.82", d: "-1.48%", up: false },
      ];
      const track = document.getElementById("tickerTrack");
      function renderTicker(items) {
        for (const it of items) {
          const span = el("span", { className: "tkr-item" }, [
            t("span", "s", it.s),
            t("span", "p", it.p),
            t("span", "d " + (it.up ? "up" : "dn"), it.d),
          ]);
          track.appendChild(span);
          track.appendChild(t("span", "tkr-sep", "·"));
        }
      }
      renderTicker(tickerItems);
      renderTicker(tickerItems); // duplicate for seamless loop

      // ═══ Block factory ═══
      function makeEditBar(defaultSz) {
        const grip = t("span", "grip", "⋮⋮");
        grip.setAttribute("draggable", "true");
        grip.setAttribute("title", "Drag to move");

        const szGroup = el("div", { className: "sz-group" });
        const sizes = [
          { sz: 3, label: "S" },
          { sz: 4, label: "M" },
          { sz: 6, label: "L" },
          { sz: 8, label: "XL" },
          { sz: 12, label: "Full" },
        ];
        for (const sz of sizes) {
          const b = el(
            "button",
            { className: "sz" + (sz.sz === defaultSz ? " on" : ""), "data-sz": sz.sz },
            sz.label
          );
          szGroup.appendChild(b);
        }
        const x = t("button", "x", "×");
        x.setAttribute("title", "Hide");
        return el("div", { className: "block-edit" }, [grip, szGroup, x]);
      }

      function makeBlock(id, sizeCols, title, hint, body) {
        const head = el("div", { className: "block-head" }, [

          "section",
          { className: "block col-" + sizeCols, "data-id": id },
          [makeEditBar(sizeCols), head, body]

      function bodyChart() {
        const svgNS = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("class", "chart-svg");
        svg.setAttribute("viewBox", "0 0 800 140");
        svg.setAttribute("preserveAspectRatio", "none");

        const defs = document.createElementNS(svgNS, "defs");
        const lg = document.createElementNS(svgNS, "linearGradient");
        lg.setAttribute("id", "grad");
        lg.setAttribute("x1", "0"); lg.setAttribute("y1", "0");
        lg.setAttribute("x2", "0"); lg.setAttribute("y2", "1");
        const s1 = document.createElementNS(svgNS, "stop");
        s1.setAttribute("offset", "0%");
        s1.setAttribute("stop-color", "#2563eb");
        s1.setAttribute("stop-opacity", "0.16");
        const s2 = document.createElementNS(svgNS, "stop");
        s2.setAttribute("offset", "100%");
        s2.setAttribute("stop-color", "#2563eb");
        s2.setAttribute("stop-opacity", "0");
        lg.appendChild(s1); lg.appendChild(s2);
        defs.appendChild(lg);
        svg.appendChild(defs);

        const area = document.createElementNS(svgNS, "path");
        area.setAttribute("fill", "url(#grad)");
        area.setAttribute("d", "M 0,100 L 40,96 L 90,90 L 140,100 L 190,84 L 240,72 L 290,80 L 340,66 L 390,56 L 440,70 L 490,50 L 540,44 L 600,52 L 660,34 L 720,38 L 780,22 L 800,18 L 800,140 L 0,140 Z");
        svg.appendChild(area);

        const line = document.createElementNS(svgNS, "path");
        line.setAttribute("fill", "none");
        line.setAttribute("stroke", "#2563eb");
        line.setAttribute("stroke-width", "1.8");
        line.setAttribute("d", "M 0,100 L 40,96 L 90,90 L 140,100 L 190,84 L 240,72 L 290,80 L 340,66 L 390,56 L 440,70 L 490,50 L 540,44 L 600,52 L 660,34 L 720,38 L 780,22 L 800,18");
        svg.appendChild(line);

        const dot = document.createElementNS(svgNS, "circle");
        dot.setAttribute("cx", "800");
        dot.setAttribute("cy", "18");
        dot.setAttribute("r", "4");
        dot.setAttribute("fill", "#2563eb");
        svg.appendChild(dot);

        const meta = el("div", { className: "chart-meta" }, [
          t("span", null, "Jan 1"),
          el("span", null, [
            document.createTextNode("Today · "),
            t("span", "mono", "$284,617"),
          ]),
        ]);

        return el("div", null, [svg, meta]);
      }

      // ═══ Add-section catalog ═══
      const addCatalog = [
        "Watchlist",
        "Worth reading",
        "Insider activity",
        "Dividend calendar",
        "Options activity",
        "Allocation drift",
        "Tax-loss harvesting",
        "Notes",

        "Cash flow",
      ];
      const addList = document.getElementById("addList");
      for (const name of addCatalog) {
        const btn = el("button", null, name);
        btn.addEventListener("click", () => {
          const block = makeBlock("custom-" + Date.now(), 4, name, "New block · mock content", bodyPlaceholder(name));
          block.classList.add("added");
          grid.appendChild(block);
          wireBlock(block);
        });
        addList.appendChild(btn);
      }

      // ═══ Edit mode toggle ═══
      const editBtn = document.getElementById("editToggle");
      editBtn.addEventListener("click", () => {
        document.body.classList.toggle("editing");
        editBtn.classList.toggle("active");
      });

      // ═══ Per-block interactions ═══
      function wireBlock(block) {
        // Size buttons
        block.querySelectorAll(".block-edit .sz").forEach((btn) => {
          btn.addEventListener("click", (e) => {
            e.stopPropagation();
            const newSz = btn.dataset.sz;
            block.classList.forEach((c) => {
              if (c.startsWith("col-")) block.classList.remove(c);
            });
            block.classList.add("col-" + newSz);
            btn.closest(".sz-group").querySelectorAll(".sz").forEach((b) => b.classList.remove("on"));
            btn.classList.add("on");
          });
        });
        // Hide
        const x = block.querySelector(".block-edit .x");
        if (x) {
          x.addEventListener("click", (e) => {
            e.stopPropagation();
            block.style.display = "none";
          });
        }
        // Drag-to-reorder
        block.setAttribute("draggable", "true");
        block.addEventListener("dragstart", (e) => {
          if (!document.body.classList.contains("editing")) {
            e.preventDefault();
            return;
          }
          dragSource = block;
          block.style.opacity = "0.4";
          e.dataTransfer.effectAllowed = "move";
        });
        block.addEventListener("dragend", () => {
          block.style.opacity = "1";
          dragSource = null;
        });
        block.addEventListener("dragover", (e) => {
          if (!dragSource || dragSource === block) return;
          e.preventDefault();
          e.dataTransfer.dropEffect = "move";
        });
        block.addEventListener("drop", (e) => {
          if (!dragSource || dragSource === block) return;
          e.preventDefault();
          const blocks = [...grid.children];
          const srcIndex = blocks.indexOf(dragSource);
          const tgtIndex = blocks.indexOf(block);
          if (srcIndex < tgtIndex) {
            grid.insertBefore(dragSource, block.nextSibling);
          } else {
            grid.insertBefore(dragSource, block);
          }
        });
      }
      let dragSource = null;
      document.querySelectorAll(".block").forEach(wireBlock);
    </script>
