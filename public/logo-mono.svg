<?xml version="1.0" encoding="UTF-8"?>
<!--
  Monochrome header variant — uses currentColor so it tints from the
  CSS color context (foreground on light, background on dark). Use
  this wherever the logo must adapt to text color (e.g. favicon-like
  contexts, tight-palette surfaces, email signatures).
-->
